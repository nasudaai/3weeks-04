<!DOCTYPE html>
<html>
<body>
  <h1>Audio Test</h1>
  <button id="play">音を鳴らす</button>

  <script>
    document.getElementById('play').addEventListener('click', () => {
      const ctx = new AudioContext();
      const osc = ctx.createOscillator();
      osc.connect(ctx.destination);
      osc.start();
      osc.stop(ctx.currentTime + 0.5);
    });
  </script>
</body>
</html>
